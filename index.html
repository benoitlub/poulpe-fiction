  <script>
    (function () {
      function truth() {
        var list = document.querySelector('.journey-stages');
        if (!list || !window.GardenStore) return;
        var stages = list.querySelectorAll('.journey-stage');
        if (stages.length < 5) return;
        var draft = window.AdventureDraft && window.AdventureDraft.load ? window.AdventureDraft.load() : null;
        var seedId = draft && draft.curiosity ? draft.curiosity.id : null;
        var parcelId = draft && draft.curiosity ? draft.curiosity.parcelId : null;
        var data = window.GardenStore.snapshot ? window.GardenStore.snapshot() : { harvests: [], operations: [] };
        var harvest = (data.harvests || []).find(function (item) { return (seedId && item.seedId === seedId) || (parcelId && item.parcelId === parcelId); });
        function setStage(index, state, detail) {
          var stage = stages[index];
          if (!stage) return;
          stage.classList.remove('done', 'active', 'blocked', 'pending');
          stage.classList.add(state);
          var icon = stage.querySelector('span');
          var paragraph = stage.querySelector('p');
          if (icon) icon.textContent = state === 'done' ? '✓' : state === 'active' ? '●' : state === 'blocked' ? '!' : '○';
          if (paragraph) paragraph.textContent = detail;
        }
        if (harvest && (harvest.content || harvest.preview || harvest.url || harvest.downloadUrl)) {
          setStage(2, 'done', 'Un artefact réel a été produit.');
          setStage(4, 'done', 'La récolte est disponible dans le Garden.');
        } else {
          setStage(2, 'active', 'Gérard prépare une récolte locale.');
          setStage(4, 'pending', 'Le retour sera visible dès que le livrable est prêt.');
        }
      }
      window.addEventListener('poulpe-garden-changed', function () { setTimeout(truth, 0); });
      window.addEventListener('poulpe-octopus-result', function () { setTimeout(truth, 0); });
      document.addEventListener('click', function () { setTimeout(truth, 0); }, true);
      setTimeout(truth, 0);
    })();
  </script>
